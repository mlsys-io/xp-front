# xp-ui nginx — terminates TLS for xp.io, proxies /api/* to
# xpcloud backend, serves the React SPA for everything else.

server {
    listen 80;
    server_name xp.io;

    # ACME challenges bubble through edge-proxy :80.
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    http2 on;
    server_name xp.io;

    ssl_certificate     /etc/letsencrypt/live/xp.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/xp.io/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer-when-downgrade always;

    root /usr/share/nginx/html;
    index index.html;

    # Long-cache hashed assets; index.html revalidates so deploys
    # land without cache-busting.
    location /assets/ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
    }
    location = /index.html {
        add_header Cache-Control "no-cache" always;
        etag off;
        if_modified_since off;
    }

    # xpcloud backend — FastAPI on host port 8900. host.docker.internal
    # resolves via extra_hosts in docker-compose (host-gateway).
    location /api/v1/ {
        proxy_pass http://host.docker.internal:8900;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }

    # React Router — client-side routes hit 200, not 404.
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
